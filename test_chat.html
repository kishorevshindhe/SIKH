<!DOCTYPE html>
<html lang="en">
<head>
  <title>SIKH Chat Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; }
    h2 { color: #333; }
    .section { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
    .section h3 { margin-top: 0; color: #444; }
    #messages, #room-messages, #dm-messages { border: 1px solid #ccc; height: 180px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #f9f9f9; font-size: 13px; }
    .message { margin: 4px 0; padding: 5px 10px; background: #fff; border-radius: 6px; border-left: 3px solid #4CAF50; }
    .system { border-left-color: #2196F3; color: #555; }
    .dm { border-left-color: #9C27B0; }
    input[type=text] { padding: 8px; width: 60%; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    button { padding: 8px 14px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; margin-left: 4px; font-size: 13px; }
    button:hover { background: #45a049; }
    .status { font-weight: bold; margin-bottom: 8px; font-size: 13px; }
    .connected { color: green; }
    .disconnected { color: red; }
  </style>
</head>
<body>

  <h2>SIKH — Chat System Test</h2>

  <!-- PUBLIC CHAT -->
  <div class="section">
    <h3>🌐 Public Chat</h3>
    <div class="status disconnected" id="public-status">Not connected</div>
    <div id="messages"></div>
    <input type="text" id="pub-username" placeholder="Your username" />
    <button onclick="connectPublic()">Connect</button>
    <br><br>
    <input type="text" id="pub-message" placeholder="Type a message..." />
    <button onclick="sendPublic()">Send</button>
  </div>

  <!-- PRIVATE ROOM -->
  <div class="section">
    <h3>🔒 Private Study Room</h3>
    <div class="status disconnected" id="room-status">Not connected</div>
    <div id="room-messages"></div>
    <input type="text" id="room-username" placeholder="Your username" />
    <input type="text" id="room-id" placeholder="Room ID (e.g. room1)" />
    <button onclick="connectRoom()">Join Room</button>
    <br><br>
    <input type="text" id="room-message" placeholder="Type a message..." />
    <button onclick="sendRoom()">Send</button>
  </div>

  <!-- DIRECT MESSAGE -->
  <div class="section">
    <h3>💬 Direct Message</h3>
    <div class="status disconnected" id="dm-status">Not connected</div>
    <div id="dm-messages"></div>
    <input type="text" id="dm-myid" placeholder="Your user ID" />
    <button onclick="connectDM()">Connect</button>
    <br><br>
    <input type="text" id="dm-toid" placeholder="Send to user ID" />
    <input type="text" id="dm-message" placeholder="Type a message..." />
    <button onclick="sendDM()">Send DM</button>
  </div>

  <script>
    const PORT = window.location.port;
    const WS = `ws://localhost:${PORT}`;

    let pubWs, roomWs, dmWs;

    function addMessage(containerId, text, type="message") {
      const box = document.getElementById(containerId);
      const div = document.createElement("div");
      div.classList.add(type);
      div.innerText = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // PUBLIC CHAT
    function connectPublic() {
      const username = document.getElementById("pub-username").value.trim();
      if (!username) return alert("Enter a username!");
      pubWs = new WebSocket(`${WS}/ws/public/${username}`);
      pubWs.onopen = () => {
        document.getElementById("public-status").className = "status connected";
        document.getElementById("public-status").innerText = `Connected as ${username}`;
      };
      pubWs.onmessage = (e) => {
        const type = e.data.startsWith("[System]") ? "system" : "message";
        addMessage("messages", e.data, type);
      };
      pubWs.onclose = () => {
        document.getElementById("public-status").className = "status disconnected";
        document.getElementById("public-status").innerText = "Disconnected";
      };
    }
    function sendPublic() {
      const msg = document.getElementById("pub-message");
      if (pubWs && pubWs.readyState === WebSocket.OPEN && msg.value.trim()) {
        pubWs.send(msg.value.trim());
        msg.value = "";
      }
    }

    // PRIVATE ROOM
    function connectRoom() {
      const username = document.getElementById("room-username").value.trim();
      const roomId = document.getElementById("room-id").value.trim();
      if (!username || !roomId) return alert("Enter username and room ID!");
      roomWs = new WebSocket(`${WS}/ws/room/${roomId}/${username}`);
      roomWs.onopen = () => {
        document.getElementById("room-status").className = "status connected";
        document.getElementById("room-status").innerText = `Connected as ${username} in room: ${roomId}`;
      };
      roomWs.onmessage = (e) => {
        const type = e.data.startsWith("[System]") ? "system" : "message";
        addMessage("room-messages", e.data, type);
      };
      roomWs.onclose = () => {
        document.getElementById("room-status").className = "status disconnected";
        document.getElementById("room-status").innerText = "Disconnected";
      };
    }
    function sendRoom() {
      const msg = document.getElementById("room-message");
      if (roomWs && roomWs.readyState === WebSocket.OPEN && msg.value.trim()) {
        roomWs.send(msg.value.trim());
        msg.value = "";
      }
    }

    // DIRECT MESSAGE
    function connectDM() {
      const myId = document.getElementById("dm-myid").value.trim();
      if (!myId) return alert("Enter your user ID!");
      dmWs = new WebSocket(`${WS}/ws/direct/${myId}`);
      dmWs.onopen = () => {
        document.getElementById("dm-status").className = "status connected";
        document.getElementById("dm-status").innerText = `Connected as ${myId}`;
      };
      dmWs.onmessage = (e) => addMessage("dm-messages", e.data, "dm");
      dmWs.onclose = () => {
        document.getElementById("dm-status").className = "status disconnected";
        document.getElementById("dm-status").innerText = "Disconnected";
      };
    }
    function sendDM() {
      const toId = document.getElementById("dm-toid").value.trim();
      const msg = document.getElementById("dm-message");
      if (dmWs && dmWs.readyState === WebSocket.OPEN && toId && msg.value.trim()) {
        dmWs.send(`${toId}:${msg.value.trim()}`);
        msg.value = "";
      }
    }

    // Enter key support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (document.activeElement.id === "pub-message") sendPublic();
        if (document.activeElement.id === "room-message") sendRoom();
        if (document.activeElement.id === "dm-message") sendDM();
      }
    });
  </script>

</body>
</html>
