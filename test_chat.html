<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SIKH Chat Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { color: #e94560; margin-bottom: 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: #16213e; border: none; color: #eee; cursor: pointer; border-radius: 6px; font-size: 14px; }
    .tab.active { background: #e94560; }
    .panel { display: none; background: #16213e; padding: 20px; border-radius: 10px; }
    .panel.active { display: block; }
    input, textarea { width: 100%; padding: 10px; margin: 6px 0 12px; background: #0f3460; border: none; color: #eee; border-radius: 6px; font-size: 14px; }
    button { padding: 10px 20px; background: #e94560; border: none; color: white; border-radius: 6px; cursor: pointer; margin-right: 8px; font-size: 14px; }
    button:hover { background: #c73652; }
    button.green { background: #2ecc71; }
    button.green:hover { background: #27ae60; }
    button.red { background: #e74c3c; }
    .messages { background: #0f3460; padding: 15px; border-radius: 6px; height: 250px; overflow-y: auto; margin: 12px 0; font-size: 13px; line-height: 1.8; }
    .status { font-size: 12px; color: #2ecc71; margin-bottom: 10px; }
    .status.off { color: #e74c3c; }
    label { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>

<h1>🔒 SIKH Chat Tester</h1>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="showTab('login')">🔑 Login</button>
  <button class="tab" onclick="showTab('public')">🌐 Public</button>
  <button class="tab" onclick="showTab('room')">🏠 Room</button>
  <button class="tab" onclick="showTab('dm')">💬 DM</button>
  <button class="tab" onclick="showTab('voice')">🎙️ Voice</button>
</div>

<!-- Login Panel -->
<div id="tab-login" class="panel active">
  <h3 style="margin-bottom:15px">Login to get your token</h3>
  <label>Email</label>
  <input id="login-email" placeholder="Enter your email" />
  <label>Password</label>
  <input id="login-password" type="password" placeholder="Enter your password" />
  <button class="green" onclick="doLogin()">Login</button>
  <div style="margin-top:15px">
    <label>Your Token (auto-filled after login):</label>
    <textarea id="token-display" rows="3" placeholder="Token will appear here..."></textarea>
  </div>
</div>

<!-- Public Chat Panel -->
<div id="tab-public" class="panel">
  <h3 style="margin-bottom:15px">🌐 Public Chat</h3>
  <div id="public-status" class="status off">● Disconnected</div>
  <button class="green" onclick="connectPublic()">Connect</button>
  <button class="red" onclick="disconnectPublic()">Disconnect</button>
  <div class="messages" id="public-messages"></div>
  <input id="public-input" placeholder="Type a message..." />
  <button onclick="sendPublic()">Send</button>
</div>

<!-- Room Chat Panel -->
<div id="tab-room" class="panel">
  <h3 style="margin-bottom:15px">🏠 Room Chat</h3>
  <label>Room ID</label>
  <input id="room-id" placeholder="1" value="1" />
  <div id="room-status" class="status off">● Disconnected</div>
  <button class="green" onclick="connectRoom()">Connect</button>
  <button class="red" onclick="disconnectRoom()">Disconnect</button>
  <div class="messages" id="room-messages"></div>
  <input id="room-input" placeholder="Type a message..." />
  <button onclick="sendRoom()">Send</button>
</div>

<!-- DM Panel -->
<div id="tab-dm" class="panel">
  <h3 style="margin-bottom:15px">💬 Direct Message</h3>
  <div id="dm-status" class="status off">● Disconnected</div>
  <button class="green" onclick="connectDM()">Connect</button>
  <button class="red" onclick="disconnectDM()">Disconnect</button>
  <div class="messages" id="dm-messages"></div>
  <label>Send to username</label>
  <input id="dm-to" placeholder="Enter username" />
  <label>Message</label>
  <input id="dm-input" placeholder="Type a message..." />
  <button onclick="sendDM()">Send</button>
</div>

<!-- Voice Panel -->
<div id="tab-voice" class="panel">
  <h3 style="margin-bottom:15px">🎙️ Voice Lobby</h3>
  <label>Room ID</label>
  <input id="voice-room-id" placeholder="1" value="1" />
  <div id="voice-status" class="status off">● Disconnected</div>
  <button class="green" onclick="connectVoice()">Join Voice</button>
  <button class="red" onclick="disconnectVoice()">Leave Voice</button>
  <div class="messages" id="voice-messages"></div>
  <div id="remote-audio"></div>
</div>

<script>
  const BASE = "ws://localhost:9000";
  const API  = "http://localhost:9000";
  let token = "";
  let publicWS, roomWS, dmWS, voiceWS;
  let peerConnections = {};

  // ── Tab switching ───────────────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
  }

  // ── Login ───────────────────────────────────────────────────────────
  async function doLogin() {
    const email    = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.access_token) {
      token = data.access_token;
      document.getElementById('token-display').value = token;
      alert('✅ Logged in! Token saved. You can now use other tabs.');
    } else {
      alert('❌ Login failed: ' + JSON.stringify(data));
    }
  }

  // ── Log to message box ──────────────────────────────────────────────
  function log(id, msg) {
    const box = document.getElementById(id);
    box.innerHTML += `<div>${msg}</div>`;
    box.scrollTop = box.scrollHeight;
  }

  function setStatus(id, connected) {
    const el = document.getElementById(id);
    el.textContent = connected ? '● Connected' : '● Disconnected';
    el.className = connected ? 'status' : 'status off';
  }

  // ── Public Chat ─────────────────────────────────────────────────────
  function connectPublic() {
    if (!token) return alert('Login first!');
    publicWS = new WebSocket(`${BASE}/ws/public?token=${token}`);
    publicWS.onopen    = () => setStatus('public-status', true);
    publicWS.onmessage = e => log('public-messages', e.data);
    publicWS.onclose   = () => setStatus('public-status', false);
  }
  function disconnectPublic() { publicWS && publicWS.close(); }
  function sendPublic() {
    const msg = document.getElementById('public-input').value;
    if (publicWS && msg) { publicWS.send(msg); document.getElementById('public-input').value = ''; }
  }

  // ── Room Chat ───────────────────────────────────────────────────────
  function connectRoom() {
    if (!token) return alert('Login first!');
    const roomId = document.getElementById('room-id').value;
    roomWS = new WebSocket(`${BASE}/ws/room/${roomId}?token=${token}`);
    roomWS.onopen    = () => setStatus('room-status', true);
    roomWS.onmessage = e => log('room-messages', e.data);
    roomWS.onclose   = () => setStatus('room-status', false);
  }
  function disconnectRoom() { roomWS && roomWS.close(); }
  function sendRoom() {
    const msg = document.getElementById('room-input').value;
    if (roomWS && msg) { roomWS.send(msg); document.getElementById('room-input').value = ''; }
  }

  // ── DM ──────────────────────────────────────────────────────────────
  function connectDM() {
    if (!token) return alert('Login first!');
    dmWS = new WebSocket(`${BASE}/ws/dm?token=${token}`);
    dmWS.onopen    = () => setStatus('dm-status', true);
    dmWS.onmessage = e => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'error') {
          log('dm-messages', `⚠️ ${data.message}`);
        } else {
          log('dm-messages', e.data);
        }
      } catch {
        log('dm-messages', e.data);
      }
    };
    dmWS.onclose   = () => setStatus('dm-status', false);
  }
  function disconnectDM() { dmWS && dmWS.close(); }
  function sendDM() {
    const to  = document.getElementById('dm-to').value;
    const msg = document.getElementById('dm-input').value;
    if (dmWS && to && msg) {
      dmWS.send(JSON.stringify({ to, message: msg }));
      log('dm-messages', `[You → ${to}]: ${msg}`);
      document.getElementById('dm-input').value = '';
    }
  }

  // ── Voice Lobby (WebRTC) ────────────────────────────────────────────
  const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  function connectVoice() {
    if (!token) return alert('Login first!');
    const roomId = document.getElementById('voice-room-id').value;
    voiceWS = new WebSocket(`${BASE}/ws/voice/${roomId}?token=${token}`);
    voiceWS.onopen    = () => { setStatus('voice-status', true); log('voice-messages', '🎙️ Joined voice lobby'); }
    voiceWS.onclose   = () => setStatus('voice-status', false);
    voiceWS.onmessage = async e => {
      const data = JSON.parse(e.data);
      log('voice-messages', `📡 Signal: ${data.type} ${data.from ? 'from ' + data.from : ''}`);
      await handleVoiceSignal(data);
    };
  }

  function disconnectVoice() {
    voiceWS && voiceWS.close();
    Object.values(peerConnections).forEach(pc => pc.close());
    peerConnections = {};
    log('voice-messages', '🔴 Left voice lobby');
  }

  async function handleVoiceSignal(data) {
    const from = data.from;
    if (data.type === 'user_joined_voice') {
      log('voice-messages', `👤 ${from} joined voice — starting call...`);
      await startCall(from);
    } else if (data.type === 'offer') {
      await handleOffer(from, data.offer);
    } else if (data.type === 'answer') {
      await peerConnections[from]?.setRemoteDescription(data.answer);
    } else if (data.type === 'ice') {
      await peerConnections[from]?.addIceCandidate(data.candidate);
    } else if (data.type === 'user_left_voice') {
      log('voice-messages', `👤 ${from} left voice`);
      peerConnections[from]?.close();
      delete peerConnections[from];
    }
  }

  async function startCall(toUsername) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const pc = new RTCPeerConnection(iceServers);
    peerConnections[toUsername] = pc;
    stream.getTracks().forEach(t => pc.addTrack(t, stream));
    pc.onicecandidate = e => {
      if (e.candidate) voiceWS.send(JSON.stringify({ type: 'ice', to: toUsername, candidate: e.candidate }));
    };
    pc.ontrack = e => {
      const audio = document.createElement('audio');
      audio.srcObject = e.streams[0];
      audio.autoplay = true;
      document.getElementById('remote-audio').appendChild(audio);
      log('voice-messages', `🔊 Receiving audio from ${toUsername}`);
    };
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    voiceWS.send(JSON.stringify({ type: 'offer', to: toUsername, offer }));
  }

  async function handleOffer(fromUsername, offer) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const pc = new RTCPeerConnection(iceServers);
    peerConnections[fromUsername] = pc;
    stream.getTracks().forEach(t => pc.addTrack(t, stream));
    pc.onicecandidate = e => {
      if (e.candidate) voiceWS.send(JSON.stringify({ type: 'ice', to: fromUsername, candidate: e.candidate }));
    };
    pc.ontrack = e => {
      const audio = document.createElement('audio');
      audio.srcObject = e.streams[0];
      audio.autoplay = true;
      document.getElementById('remote-audio').appendChild(audio);
      log('voice-messages', `🔊 Receiving audio from ${fromUsername}`);
    };
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    voiceWS.send(JSON.stringify({ type: 'answer', to: fromUsername, answer }));
  }

  // Enter key to send
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('tab-public').classList.contains('active')) sendPublic();
      else if (document.getElementById('tab-room').classList.contains('active')) sendRoom();
      else if (document.getElementById('tab-dm').classList.contains('active')) sendDM();
    }
  });
</script>
</body>
</html>
